<head>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;overflow-x:hidden;overscroll-behavior:none;font-family:'Segoe UI',system-ui,sans-serif}
button{touch-action:manipulation;cursor:pointer;border:none;outline:none}
#app{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}

@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-18px) rotate(5deg)}50%{transform:translateY(-8px) rotate(-3deg)}75%{transform:translateY(-22px) rotate(2deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes bounceIn{0%{opacity:0;transform:scale(.7)}60%{opacity:1;transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes starBurst{0%{opacity:1;transform:scale(0) rotate(0deg)}50%{opacity:1;transform:scale(1.4) rotate(180deg)}100%{opacity:0;transform:scale(2) rotate(360deg)}}
@keyframes slideUp{0%{opacity:0;transform:translateY(40px)}100%{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}

.animate-float{animation:float 4s ease-in-out infinite}
.animate-pulse-custom{animation:pulse 2s ease-in-out infinite}
.animate-bounce-in{animation:bounceIn .5s ease-out forwards}
.animate-slide-up{animation:slideUp .45s ease-out forwards}
.animate-fade-in{animation:fadeIn .35s ease-out forwards}
.animate-wiggle{animation:wiggle .4s ease-in-out 3}

.star-burst{position:absolute;font-size:2rem;animation:starBurst .7s ease-out forwards;pointer-events:none}
.floating-star{position:absolute;font-size:1.6rem;opacity:.55;animation:float 5s ease-in-out infinite}
.floating-star:nth-child(2){animation-delay:1s;font-size:1.2rem}
.floating-star:nth-child(3){animation-delay:2s;font-size:2rem}
.floating-star:nth-child(4){animation-delay:3s;font-size:1rem}
.floating-star:nth-child(5){animation-delay:1.5s;font-size:1.4rem}

.overlay-correct{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(34,197,94,.92);animation:fadeIn .2s ease-out}
.overlay-wrong{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(251,146,60,.90);animation:fadeIn .2s ease-out}

.answer-btn{min-height:72px;border-radius:16px;font-size:1.4rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:transform .12s,box-shadow .12s;box-shadow:0 4px 6px rgba(0,0,0,.15)}
.answer-btn:active{transform:scale(.95)}
.answer-btn.disabled{pointer-events:none;opacity:.6}

.speak-btn{position:fixed;top:12px;right:12px;z-index:40;width:48px;height:48px;border-radius:50%;background:#5B3E96;color:#fff;font-size:1.4rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.progress-star{font-size:1.3rem;margin:0 2px;transition:transform .2s}
.student-card{transition:transform .15s,box-shadow .15s;cursor:pointer}
.student-card:hover,.student-card:active{transform:scale(1.05);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.emoji-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;max-width:340px;margin:0 auto}
.emoji-grid span{font-size:1.8rem;line-height:1}

.teacher-table{width:100%;border-collapse:collapse;font-size:.8rem}
.teacher-table th,.teacher-table td{padding:5px 6px;border:1px solid #e5e7eb;text-align:left}
.teacher-table th{background:#f3f4f6;font-weight:600}
.teacher-table tr.correct-row{background:#f0fdf4}
.teacher-table tr.wrong-row{background:#fef2f2}

.level-badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.75rem;font-weight:700;text-transform:uppercase}
.level-exceeding{background:#dcfce7;color:#166534}
.level-meeting{background:#dbeafe;color:#1e40af}
.level-developing{background:#fef9c3;color:#854d0e}
.level-beginning{background:#fee2e2;color:#991b1b}

.rec-card{border-left:4px solid;padding:8px 12px;margin-bottom:8px;border-radius:0 8px 8px 0;font-size:.85rem}
.rec-spring{border-color:#4285C4;background:#eff6ff}
.rec-summer{border-color:#D4A843;background:#fefce8}

@media print{
  .no-print{display:none!important}
  body{font-size:11px}
  #app{min-height:auto}
}
</style>
</head>

const shuffle = arr => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; };

function speak(text){
  try{
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.85; u.pitch=1.1; u.lang='en-US';

/* ── State ── */
let state = resetState();

function resetState(){
  return {
    screen:'WELCOME',
    student:null,
    currentSection:0,
    currentQuestion:0,
    results:[],
    sectionResults:[],
    startTime:null,

    sections:[],
    answering:false
  };
}

/* ── DOMAIN MAPPING ── */
const LA_SECTIONS = ['Uppercase Letters','Lowercase Letters','Letter Sounds','CVC Words','Sentences'];
const MATH_SECTIONS = ['Counting Objects','Number Recognition','Addition','Subtraction','Days of the Week'];

/* ── Section Builders ── */

const UPPERCASE_TARGETS = ['A','M','S','D','T','B'];
const LOWERCASE_TARGETS = ['a','m','s','d','t','b'];
const ALL_UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const ALL_LOWER = 'abcdefghijklmnopqrstuvwxyz'.split('');

const SIMILAR_UPPER = {A:['H','V','W'],M:['N','W'],S:['Z','5'],D:['O','B'],T:['I','L'],B:['D','P','R']};
const SIMILAR_LOWER = {a:['o','e','c'],m:['n','r'],s:['z','c'],d:['b','p','q'],t:['l','i','f'],b:['d','p','q']};

function letterDistractors(target, pool, similar){
  const avoid = new Set([target, ...(similar[target]||[])]);
  const candidates = pool.filter(l=>!avoid.has(l));
  return shuffle(candidates).slice(0,3);
}

function buildLetterSection(targets, pool, similar, isUpper){
  const label = isUpper ? 'Uppercase Letters' : 'Lowercase Letters';
  const emoji = isUpper ? '📝' : '🔤';
  const desc  = isUpper ? "Let's find some big letters!" : "Now let's find the little letters!";
  const domain = 'Language Arts';
  const questions = shuffle(targets).map(t=>{
    const distractors = letterDistractors(t, pool, similar);
    return {
      type:'letter',
      prompt:`Tap the letter  ${t}`,
      speakText:`Tap the letter ${t}`,
      choices: shuffle([t,...distractors]),
      correct: t,
      section: label,
      domain
    };
  });
  return { label, emoji, desc, questions, domain };
}

function buildSoundsSection(){
  const sounds = shuffle([
    {phoneme:'/m/',say:'mmm',answer:'M'},
    {phoneme:'/s/',say:'sss',answer:'S'},
    {phoneme:'/t/',say:'tuh',answer:'T'},
    {phoneme:'/b/',say:'buh',answer:'B'},
    {phoneme:'/a/',say:'aah',answer:'A'},
    {phoneme:'/d/',say:'duh',answer:'D'},
  ]);
  const questions = sounds.map(s=>{
    const pool = ['A','B','D','M','S','T'].filter(l=>l!==s.answer);
    const distractors = shuffle(pool).slice(0,3);
    return {
      type:'sound',
      prompt:'Which letter makes this sound?',
      speakText: s.say,
      phoneme: s.phoneme,
      say: s.say,
      choices: shuffle([s.answer,...distractors]),
      correct: s.answer,
      section:'Letter Sounds',
      domain:'Language Arts'
    };
  });
  return { label:'Letter Sounds', emoji:'🔊', desc:"Listen carefully and find the letter!", questions, domain:'Language Arts' };
}

function buildCVCSection(){
  const words = shuffle([
    {word:'CAT', img:'🐱', choices:['CAT','CUT','COT','BAT']},
    {word:'DOG', img:'🐕', choices:['DIG','DOG','LOG','BOG']},
    {word:'SUN', img:'☀️', choices:['SUN','SIT','RUN','FUN']},
    {word:'BIG', img:'🐘', choices:['BAG','BUG','BIG','DIG']},
    {word:'HOP', img:'🐰', choices:['HIP','HOP','TOP','MOP']},
    {word:'PEN', img:'🖊️', choices:['PIN','PAN','PEN','TEN']},
  ]);
  const questions = words.map(w=>({
    type:'cvc',
    prompt:`Look at the picture. Which word is this?`,
    speakText:`Look at the picture. Which word is this?`,
    displayEmoji: w.img,
    choices: shuffle(w.choices),
    correct: w.word,
    section:'CVC Words',
    domain:'Language Arts'
  }));
  return { label:'CVC Words', emoji:'📖', desc:"Match the picture to the word!", questions, domain:'Language Arts' };
}

function buildSentencesSection(){
  const items = shuffle([
    {sentence:'The cat sat on the ___.',answer:'mat',choices:['mat','map','man','mad'],hint:'🐱 on something soft'},
    {sentence:'I can see a big ___ .',answer:'dog',choices:['dog','log','dig','dot'],hint:'🐕 a friendly animal'},
    {sentence:'The ___ is hot.',answer:'sun',choices:['sun','run','bun','fun'],hint:'☀️ up in the sky'},
    {sentence:'She has a red ___.',answer:'hat',choices:['hat','hit','hot','bat'],hint:'👒 you wear on your head'},
    {sentence:'He can ___ fast.',answer:'run',choices:['run','fun','sun','bun'],hint:'🏃 moving quickly'},
  ]);
  const questions = items.map(it=>({
    type:'sentence',
    prompt: it.sentence,
    speakText: it.sentence.replace('___','blank'),
    displayHint: it.hint,
    choices: shuffle(it.choices),
    correct: it.answer,
    section:'Sentences',
    domain:'Language Arts'
  }));
  return { label:'Sentences', emoji:'📝', desc:"Fill in the missing word!", questions, domain:'Language Arts' };
}

function buildCountingSection(){
  const items = shuffle([
    {count:4, emoji:'⭐', name:'stars', choices:[3,4,5,6]},
    {count:7, emoji:'❤️', name:'hearts', choices:[5,6,7,8]},
    {count:11,emoji:'🍎', name:'apples', choices:[9,10,11,12]},
    {count:15,emoji:'🐟', name:'fish', choices:[13,14,15,16]},
    {count:18,emoji:'🌸', name:'flowers', choices:[16,17,18,19]},
  ]);
  const questions = items.map(it=>({
    type:'counting',
    prompt:`How many ${it.name} do you see?`,
    speakText:`How many ${it.name} do you see?`,
    emojiChar: it.emoji,
    emojiCount: it.count,
    choices: shuffle(it.choices).map(String),
    correct: String(it.count),
    section:'Counting Objects',
    domain:'Math'
  }));
  return { label:'Counting Objects', emoji:'🔢', desc:"Count the objects carefully!", questions, domain:'Math' };
}

function buildNumberSection(){
  const nums = shuffle([
    {n:3, choices:[1,2,3,4]},
    {n:8, choices:[6,7,8,9]},
    {n:12,choices:[10,11,12,13]},
    {n:16,choices:[14,15,16,17]},
    {n:20,choices:[18,19,20,21]},
  ]);
  const questions = nums.map(it=>({
    type:'number',
    prompt:'What number is this?',
    speakText:'What number is this?',
    bigNumber: it.n,
    choices: shuffle(it.choices).map(String),
    correct: String(it.n),
    section:'Number Recognition',
    domain:'Math'
  }));
  return { label:'Number Recognition', emoji:'🔟', desc:"Can you read these numbers?", questions, domain:'Math' };
}

function buildAdditionSection(){
  const problems = shuffle([
    {a:2,b:3,choices:[4,5,6,3]},
    {a:4,b:1,choices:[3,4,5,6]},
    {a:3,b:3,choices:[5,6,7,4]},
    {a:5,b:2,choices:[6,7,8,5]},
    {a:1,b:6,choices:[5,6,7,8]},
    {a:4,b:4,choices:[7,8,9,6]},
  ]);
  const questions = problems.map(p=>({
    type:'math',
    prompt:`${p.a} + ${p.b} = ?`,
    speakText:`What is ${p.a} plus ${p.b}?`,
    choices: shuffle(p.choices).map(String),
    correct: String(p.a+p.b),
    section:'Addition',
    domain:'Math'
  }));
  return { label:'Addition', emoji:'➕', desc:"Let's add some numbers together!", questions, domain:'Math' };
}

function buildSubtractionSection(){
  const problems = shuffle([
    {a:5,b:2,choices:[2,3,4,1]},
    {a:7,b:3,choices:[3,4,5,2]},
    {a:6,b:1,choices:[4,5,6,3]},
    {a:8,b:4,choices:[3,4,5,2]},
    {a:9,b:5,choices:[3,4,5,2]},
    {a:10,b:3,choices:[6,7,8,5]},
  ]);
  const questions = problems.map(p=>({
    type:'math',
    prompt:`${p.a} − ${p.b} = ?`,
    speakText:`What is ${p.a} minus ${p.b}?`,
    choices: shuffle(p.choices).map(String),
    correct: String(p.a-p.b),
    section:'Subtraction',
    domain:'Math'
  }));
  return { label:'Subtraction', emoji:'➖', desc:"Let's take away some numbers!", questions, domain:'Math' };
}

function buildDaysSection(){
  const items = shuffle([
    {after:'Monday',   answer:'Tuesday',  choices:['Tuesday','Wednesday','Sunday','Friday']},
    {after:'Wednesday',answer:'Thursday', choices:['Monday','Thursday','Saturday','Tuesday']},
    {after:'Friday',   answer:'Saturday', choices:['Sunday','Saturday','Thursday','Wednesday']},
    {after:'Sunday',   answer:'Monday',   choices:['Monday','Tuesday','Friday','Saturday']},
  ]);
  const questions = items.map(it=>({
    type:'days',
    prompt:`What day comes after ${it.after}?`,
    speakText:`What day comes after ${it.after}?`,
    choices: shuffle(it.choices),
    correct: it.answer,
    section:'Days of the Week',
    domain:'Math'
  }));
  return { label:'Days of the Week', emoji:'📅', desc:"Do you know the days of the week?", questions, domain:'Math' };
}

function buildAllSections(){
  return [
    // Language Arts
    buildLetterSection(UPPERCASE_TARGETS, ALL_UPPER, SIMILAR_UPPER, true),
    buildLetterSection(LOWERCASE_TARGETS, ALL_LOWER, SIMILAR_LOWER, false),
    buildSoundsSection(),
    buildCVCSection(),
    buildSentencesSection(),
    // Math
    buildCountingSection(),
    buildNumberSection(),
    buildAdditionSection(),
    buildSubtractionSection(),
    buildDaysSection(),
  ];
}

/* ── Encouragement ── */
const CORRECT_MSGS = ['⭐ Amazing!','🌟 Great job!','✨ You\'re a star!','🎉 Awesome!','💫 Fantastic!','🥳 Wonderful!'];
const WRONG_INTROS = ['Almost!','So close!','Good try!','Nice effort!'];

/* ── Render engine ── */
const app = document.getElementById('app');

function render(){
  switch(state.screen){
    case 'WELCOME':        return renderWelcome();
    case 'STUDENT_SELECT': return renderStudentSelect();
    case 'SECTION_INTRO':  return renderSectionIntro();
    case 'QUESTION':       return renderQuestion();
    case 'CORRECT_FEEDBACK': return renderCorrectFeedback();
    case 'WRONG_FEEDBACK':   return renderWrongFeedback();
    case 'SECTION_COMPLETE': return renderSectionComplete();
    case 'ALL_DONE':         return renderAllDone();
    case 'TEACHER_SUMMARY':  return renderTeacherSummary();
  }
}

/* ── SECTION INTRO ── */
function renderSectionIntro(){
  const sec = state.sections[state.currentSection];
  const count = sec.questions.length;
  const sectionNum = state.currentSection + 1;
  const totalSections = state.sections.length;

  // Domain label
  const domainLabel = sec.domain === 'Language Arts' ? '📚 Language Arts' : '🔢 Math';

  app.innerHTML = `
    <div class="w-full min-h-[100dvh] flex flex-col items-center justify-center bg-gradient-to-br from-teal-400 via-cyan-400 to-blue-500 text-white p-6 animate-slide-up">
      <p class="text-sm opacity-70 mb-2">Section ${sectionNum} of ${totalSections} · ${domainLabel}</p>
      <div class="text-7xl mb-4 animate-bounce-in">${sec.emoji}</div>
      <h2 class="text-3xl font-bold mb-2 text-center">${sec.label}</h2>
      <p class="text-lg opacity-90 mb-1 text-center">${sec.desc}</p>
      <p class="text-md opacity-80 mb-8">${count} games to play!</p>
      <button onclick="startSectionQuestions()" class="bg-amber-400 hover:bg-amber-500 text-gray-900 font-bold text-2xl px-10 py-5 rounded-2xl shadow-lg animate-pulse-custom">Ready? Go! 🎯</button>
    </div>`;
  addSpeakBtn(`${sec.label}. ${sec.desc}. ${count} games to play. Ready? Go!`);
}

/* ── QUESTION ── */
function renderQuestion(){
  const sec = state.sections[state.currentSection];
  const q   = sec.questions[state.currentQuestion];
  const total = sec.questions.length;
  const idx   = state.currentQuestion;

  let stars = '';
  for(let i=0;i<total;i++){
    if(i < idx) stars += '<span class="progress-star">⭐</span>';
    else if(i === idx) stars += '<span class="progress-star animate-wiggle">🔵</span>';
    else stars += '<span class="progress-star">☆</span>';
  }

  let body = '';
  if(q.type==='counting'){
    let emojis = '';
    for(let i=0;i<q.emojiCount;i++) emojis += `<span>${q.emojiChar}</span>`;
    body = `<div class="emoji-grid mb-4">${emojis}</div><p class="text-2xl font-bold text-center">${q.prompt}</p>`;
  } else if(q.type==='number'){
    body = `<div class="text-center mb-2" style="font-size:clamp(100px,30vw,200px);line-height:1;font-weight:800;color:#5B3E96">${q.bigNumber}</div><p class="text-2xl font-bold text-center">${q.prompt}</p>`;
  } else if(q.type==='sound'){
    body = `<button onclick="speakSound()" class="text-7xl mb-3 bg-purple-100 w-28 h-28 rounded-full flex items-center justify-center mx-auto shadow-lg active:scale-95" style="touch-action:manipulation">🔊</button>
            <p class="text-lg text-gray-500 mb-1 text-center">Tap to hear the sound!</p>
            <p class="text-2xl font-bold text-center">${q.prompt}</p>`;
  } else if(q.type==='cvc'){
    body = `<div class="text-center mb-3" style="font-size:80px;line-height:1">${q.displayEmoji}</div>
            <p class="text-2xl font-bold text-center">${q.prompt}</p>`;
  } else if(q.type==='sentence'){
    body = `<div class="bg-white rounded-xl p-4 mb-3 shadow-md max-w-sm mx-auto">

    body = `<p class="text-3xl font-bold text-center">${q.prompt}</p>`;
  }

    'bg-blue-500 hover:bg-blue-600 text-white',
    'bg-purple-500 hover:bg-purple-600 text-white',

  ];

  `).join('');

  app.innerHTML = `
    <div class="w-full min-h-[100dvh] flex flex-col bg-gray-50 animate-fade-in">
      <div class="pt-4 px-4 flex flex-wrap justify-center">${stars}</div>

}

/* ── Grading Helpers ── */

function getLevel(pct){
  if(pct >= 90) return 'Exceeding';
  if(pct >= 70) return 'Meeting';
  if(pct >= 50) return 'Developing';
  return 'Beginning';
}

function getGradeEquiv(domain, sectionScores, age){
  if(domain === 'Language Arts'){
    const letterPct = avg(sectionScores['Uppercase Letters'], sectionScores['Lowercase Letters']);
    const soundPct = sectionScores['Letter Sounds'] || 0;
    const cvcPct = sectionScores['CVC Words'] || 0;
    const sentPct = sectionScores['Sentences'] || 0;

    if(sentPct >= 80 && cvcPct >= 80) return 'Grade 2 Reading';
    if(cvcPct >= 60 && soundPct >= 60) return 'Grade 1 Reading';
    if(letterPct >= 70 && soundPct >= 50) return 'Kindergarten Reading';
    if(letterPct >= 50) return 'Pre-K Reading';
    return 'Pre-K Emerging';
  } else {
    const countPct = sectionScores['Counting Objects'] || 0;
    const numPct = sectionScores['Number Recognition'] || 0;
    const addPct = sectionScores['Addition'] || 0;
    const subPct = sectionScores['Subtraction'] || 0;
    const daysPct = sectionScores['Days of the Week'] || 0;

    if(addPct >= 70 && subPct >= 70) return 'Grade 2 Math';
    if(addPct >= 50 && numPct >= 70) return 'Grade 1 Math';
    if(countPct >= 70 && numPct >= 50) return 'Kindergarten Math';
    if(countPct >= 50) return 'Pre-K Math';
    return 'Pre-K Emerging';
  }
}

function avg(...vals){
  const valid = vals.filter(v=>v!==undefined && v!==null);
  if(!valid.length) return 0;
  return valid.reduce((a,b)=>a+b,0)/valid.length;
}

function computeDomainAggregate(domain){
  const items = state.results.filter(r=>r.domain===domain);
  const correct = items.filter(r=>r.isCorrect).length;
  const total = items.length;
  const pct = total ? Math.round((correct/total)*100) : 0;

  let starsHtml = '';
  const starCount = Math.min(total, 30);
  const correctStars = Math.round((correct/total)*starCount);
  for(let i=0;i<starCount;i++) starsHtml += i<correctStars ? '⭐' : '☆';

  // Section-level scores
  const sectionScores = {};
  const sectionNames = domain === 'Language Arts' ? LA_SECTIONS : MATH_SECTIONS;
  sectionNames.forEach(s=>{
    const si = items.filter(r=>r.section===s);
    sectionScores[s] = si.length ? Math.round((si.filter(r=>r.isCorrect).length/si.length)*100) : null;
  });

  return { correct, total, pct, starsHtml, sectionScores };
}

function computeAllSectionScores(){
  const allSections = [...LA_SECTIONS, ...MATH_SECTIONS];
  const emojiMap = {
    'Uppercase Letters':'📝','Lowercase Letters':'🔤','Letter Sounds':'🔊',
    'CVC Words':'📖','Sentences':'📝',
    'Counting Objects':'🔢','Number Recognition':'🔟','Addition':'➕',
    'Subtraction':'➖','Days of the Week':'📅'
  };
  return allSections.map(label=>{
    const items = state.results.filter(r=>r.section===label);
    return {
      label,
      emoji: emojiMap[label]||'📋',
      correct: items.filter(r=>r.isCorrect).length,
      total: items.length,
      items
    };
  }).filter(s=>s.total>0);
}

/* ── Recommendation Generator ── */
function generateRecommendations(name, age, la, math, sections){
  const spring = [];
  const summer = [];

  // Language Arts recommendations
  const secMap = {};
  sections.forEach(s=>{ secMap[s.label] = { correct:s.correct, total:s.total, pct: s.total ? Math.round((s.correct/s.total)*100) : 0 }; });

  // LA - Letters
  const upperPct = secMap['Uppercase Letters']?.pct || 0;
  const lowerPct = secMap['Lowercase Letters']?.pct || 0;
  if(upperPct < 80 || lowerPct < 80){
    spring.push(`<strong>📚 Letter Recognition:</strong> ${name} needs practice with ${upperPct<80?'uppercase ':''}${upperPct<80&&lowerPct<80?'and ':''}${lowerPct<80?'lowercase ':''}letters. Use letter flashcards, ABC songs, and magnetic letters daily.`);
  }

  // LA - Sounds
  const soundPct = secMap['Letter Sounds']?.pct || 0;
  if(soundPct < 70){
    spring.push(`<strong>🔊 Letter Sounds:</strong> Focus on phonics — connecting letters to their sounds. Practice beginning sounds with picture cards. Try "I Spy" games with letter sounds.`);
    summer.push(`<strong>🔊 Phonics Mastery:</strong> Systematic phonics instruction — one letter-sound per day with practice words. Goal: all consonant and short vowel sounds by end of summer.`);
  }

  // LA - CVC
  const cvcPct = secMap['CVC Words']?.pct || 0;
  if(cvcPct < 70){
    if(soundPct >= 60){
      spring.push(`<strong>📖 CVC Words:</strong> ${name} is ready to blend sounds into words. Practice CVC word families (-at, -an, -ig, -op, -ug) with word building activities.`);
    }
    summer.push(`<strong>📖 CVC Reading:</strong> Build fluency with CVC word families. Use decodable readers and word-building with letter tiles. Target: read simple CVC sentences independently.`);
  }

  // LA - Sentences
  const sentPct = secMap['Sentences']?.pct || 0;
  if(sentPct < 70){
    summer.push(`<strong>📝 Sentence Reading:</strong> Practice reading simple sentences with sight words + CVC words. Use fill-in-the-blank activities and read-aloud with picture clues.`);
  }

  // If LA is strong
  if(la.pct >= 80){
    spring.push(`<strong>📚 Language Arts:</strong> ${name} shows strong foundational skills! Challenge with grade-level reading passages and introduce sight word lists.`);
  }

  // Math - Counting
  const countPct = secMap['Counting Objects']?.pct || 0;
  if(countPct < 70){
    spring.push(`<strong>🔢 Counting:</strong> Practice one-to-one counting with physical objects. Start with counting to 10 accurately, then extend to 20. Use manipulatives (blocks, beads, snacks).`);
    summer.push(`<strong>🔢 Counting Fluency:</strong> Master counting to 20 with one-to-one correspondence. Practice counting forward and backward. Introduce skip counting by 2s and 5s.`);
  }

  // Math - Number Recognition
  const numPct = secMap['Number Recognition']?.pct || 0;
  if(numPct < 70){
    spring.push(`<strong>🔟 Number Recognition:</strong> Practice recognizing and naming numbers 1-20. Use number cards, number hunts, and tracing activities.`);
  }

  // Math - Addition
  const addPct = secMap['Addition']?.pct || 0;
  if(addPct < 70){
    if(countPct >= 60){
      spring.push(`<strong>➕ Addition:</strong> Introduce addition within 10 using counting objects, number lines, and "putting together" stories. Start with +1 and +2 facts.`);
    }
    summer.push(`<strong>➕ Addition Fluency:</strong> Master addition facts within 10. Use ten-frames, number bonds, and daily fact practice. Goal: automatic recall of sums to 10.`);
  }

  // Math - Subtraction
  const subPct = secMap['Subtraction']?.pct || 0;
  if(subPct < 70){
    summer.push(`<strong>➖ Subtraction:</strong> Practice subtraction within 10 using "taking away" stories and manipulatives. Connect to addition fact families.`);
  }

  // Math - Days
  const daysPct = secMap['Days of the Week']?.pct || 0;
  if(daysPct < 70){
    spring.push(`<strong>📅 Days of the Week:</strong> Practice days in order daily. Use a morning calendar routine — "Today is ___, yesterday was ___, tomorrow will be ___".`);
  }

  // If math is strong
  if(math.pct >= 80){
    spring.push(`<strong>🔢 Math:</strong> ${name} demonstrates strong number sense! Introduce place value concepts and addition/subtraction within 20.`);
  }

  // General guidance based on age
  if(age === 7 && la.pct < 60){
    summer.push(`<strong>📚 Catch-Up Priority:</strong> At age 7, ${name} should target Grade 1 reading level by end of summer. Focus on phonics + sight words + daily read-aloud (15 min/day).`);
  }
  if(age === 9 && la.pct < 60){
    summer.push(`<strong>📚 Intensive Support:</strong> At age 9, ${name} needs accelerated phonics instruction to close the gap. Recommend daily 20-min structured literacy sessions + audiobooks for comprehension.`);
  }
  if(age === 9 && math.pct < 60){
    summer.push(`<strong>🔢 Math Acceleration:</strong> At age 9, ${name} should target Grade 2 math by end of summer. Focus on number sense (place value to 100), addition/subtraction fluency, and intro to multiplication.`);
  }

  // Ensure at least one recommendation per season
  if(!spring.length) spring.push(`<strong>✅ On Track:</strong> ${name} shows solid skills across all areas assessed. Continue current instruction and introduce next-level challenges.`);
  if(!summer.length) summer.push(`<strong>☀️ Enrichment:</strong> ${name} is meeting expectations! Use summer for enrichment — reading chapter books, math puzzles, and real-world math (cooking, shopping).`);

  return { spring, summer };
}

/* ── Navigation ── */
function goStudentSelect(){ state.screen='STUDENT_SELECT'; render(); }

function selectStudent(name,age){
  state = resetState();
  state.student = {name,age};
  state.sections = buildAllSections();
  state.startTime = Date.now();
  state.screen = 'SECTION_INTRO';
  state.currentSection = 0;
  state.currentQuestion = 0;
  state.sectionResults = [];
  render();
}

function startSectionQuestions(){
  state.currentQuestion = 0;
  state.sectionResults = [];
  state.screen='QUESTION';
  render();
}

function submitAnswer(ans){
  if(state.answering) return;
  state.answering = true;
  document.querySelectorAll('.answer-btn').forEach(b=>b.classList.add('disabled'));

  const sec = state.sections[state.currentSection];
  const q   = sec.questions[state.currentQuestion];
  const timeMs = Date.now() - state.questionStartTime;
  const isCorrect = ans === q.correct;

  const result = {
    section: q.section,
    domain: q.domain,
    question: q.prompt,
    correct: q.correct,
    answer: ans,
    isCorrect,
    timeMs
  };
  state.results.push(result);
  state.sectionResults.push(result);

  state.screen = isCorrect ? 'CORRECT_FEEDBACK' : 'WRONG_FEEDBACK';
  render();
}

function nextAfterFeedback(){
  const ov = document.getElementById('feedback-overlay');
  if(ov) ov.remove();

  const sec = state.sections[state.currentSection];
  if(state.currentQuestion < sec.questions.length - 1){
    state.currentQuestion++;
    state.screen='QUESTION';
  } else {
    state.screen='SECTION_COMPLETE';
  }
  render();
}

function goNextSection(){
  state.currentSection++;
  state.currentQuestion = 0;
  state.sectionResults = [];
  state.screen='SECTION_INTRO';
  render();
}

function goAllDone(){ state.screen='ALL_DONE'; render(); }
function goTeacher(){ state.screen='TEACHER_SUMMARY'; render(); }
function playAgain(){ state = resetState(); state.screen='STUDENT_SELECT'; render(); }

/* ── Speak button ── */
function addSpeakBtn(text){
  const old = document.getElementById('global-speak-btn');
  if(old) old.remove();
  const btn = document.createElement('button');
  btn.id='global-speak-btn';
  btn.className='speak-btn';
  btn.textContent='🔊';
  btn.onclick=()=>speak(text);
  document.body.appendChild(btn);
}

/* ── Supabase save ── */
async function saveResults(){
  try{
    const la = computeDomainAggregate('Language Arts');
    const math = computeDomainAggregate('Math');
    const sessionData = {
      student_name: state.student.name,
      student_age: state.student.age,
      completed_at: new Date().toISOString(),
      total_correct: state.results.filter(r=>r.isCorrect).length,
      total_questions: state.results.length,
      score_percent: ((state.results.filter(r=>r.isCorrect).length / state.results.length)*100).toFixed(2),
      domain_scores: {
        language_arts: { correct: la.correct, total: la.total, pct: la.pct, level: getLevel(la.pct) },
        math: { correct: math.correct, total: math.total, pct: math.pct, level: getLevel(math.pct) }
      },
      section_scores: computeAllSectionScores().map(s=>({
        label: s.label,
        correct: s.correct,
        total: s.total,
        pct: s.total ? Math.round((s.correct/s.total)*100) : 0
      })),
      raw_results: state.results,
      duration_seconds: Math.round((Date.now() - state.startTime)/1000)
    };
    const resp = await fetch(`${SUPABASE_URL}/rest/v1/mini_assessment_sessions`,{
      method:'POST',
      headers:{
        'apikey': SUPABASE_KEY,
        'Content-Type':'application/json',
        'Prefer':'return=representation'
      },
      body: JSON.stringify(sessionData)
    });
    if(resp.ok) console.log('Results saved to Supabase!');
    else console.log('Supabase save status:', resp.status);
  }catch(err){
    console.log('Could not save to DB, results shown on screen:', err);
  }
}

/* ── Prevent back navigation ── */
window.addEventListener('popstate', e=>{e.preventDefault();});
history.pushState(null,null,location.href);
window.addEventListener('popstate',()=>history.pushState(null,null,location.href));

/* ── Boot ── */
render();
</script>
